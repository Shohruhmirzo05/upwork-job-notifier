name: Upwork Job Notifier

on:
  schedule:
    # Restart heartbeat. GitHub DROPS scheduled runs under load, so we fire every 5 min
    # AND make each run last ~17 min — that's ~3 restart chances per run, so a dropped
    # cron tick can't open a coverage gap. Runs chain back-to-back (concurrency below).
    - cron: "*/5 * * * *"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

# One run at a time; the next queued run starts as soon as the current finishes
# (its dedup cache is saved on exit) -> gap-free chaining, no cache races.
concurrency:
  group: upwork-notifier
  cancel-in-progress: false

# Read-only: dedup state lives in the Actions cache, not the repo — no commits.
permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 20   # loop runs ~17 min, leaving margin for setup + cache save
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip   # cache curl_cffi wheel -> faster runs

      - name: Install deps
        run: pip install -r requirements.txt

      # Restore the most recent seen.json from cache (prefix match on restore-keys).
      # Missing on the very first run -> notifier seeds a fresh baseline silently.
      - name: Restore dedup state
        uses: actions/cache/restore@v4
        with:
          path: seen.json
          key: upwork-seen-${{ github.run_id }}
          restore-keys: |
            upwork-seen-

      - name: Run notifier (fast loop)
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WEBSHARE_URL: ${{ secrets.WEBSHARE_URL }}   # optional; leave unset to go direct
          MAX_PAGES: ${{ vars.MAX_PAGES }}
          MAX_NOTIFS: ${{ vars.MAX_NOTIFS }}
          MAX_AGE_HOURS: ${{ vars.MAX_AGE_HOURS }}
          JOBS_PER_QUERY: ${{ vars.JOBS_PER_QUERY }}
          # KEYWORDS/EXCLUDE_KEYWORDS are only a fallback if filters.json is missing.
          KEYWORDS: ${{ vars.KEYWORDS }}
          EXCLUDE_KEYWORDS: ${{ vars.EXCLUDE_KEYWORDS }}
          # loop knobs (seconds); override via repo Variables if you like
          LOOP_SECONDS: ${{ vars.LOOP_SECONDS }}
          CHECK_INTERVAL: ${{ vars.CHECK_INTERVAL }}
        run: |
          LOOP_SECONDS="${LOOP_SECONDS:-1020}"     # ~17 min of checking, then exit cleanly
          CHECK_INTERVAL="${CHECK_INTERVAL:-90}"   # ~90s between checks
          i=0
          while [ "$SECONDS" -lt "$LOOP_SECONDS" ]; do
            i=$((i + 1))
            echo "::group::check #$i (t=${SECONDS}s)"
            python notifier.py || echo "check #$i failed, continuing"
            echo "::endgroup::"
            [ "$SECONDS" -lt "$LOOP_SECONDS" ] && sleep "$CHECK_INTERVAL"
          done
          echo "loop finished after $i checks (${SECONDS}s)"

      # Save the updated seen.json so the next run dedupes against it.
      # always() -> persists even if the last check in the loop errored.
      - name: Save dedup state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: seen.json
          key: upwork-seen-${{ github.run_id }}
