name: Upwork Job Notifier

on:
  schedule:
    # Every 10 min. GitHub throttles scheduled runs under load, so real cadence
    # is ~10-15 min. You can try "*/5 * * * *" but don't expect exact 5-min.
    - cron: "*/10 * * * *"
  workflow_dispatch: {}   # lets you run it manually from the Actions tab

# Prevent overlapping runs from racing on the dedup cache
concurrency:
  group: upwork-notifier
  cancel-in-progress: false

# Read-only: dedup state lives in the Actions cache, not the repo — no commits.
permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install deps
        run: pip install -r requirements.txt

      # Restore the most recent seen.json from cache (prefix match on restore-keys).
      # Missing on the very first run -> notifier seeds a fresh baseline silently.
      - name: Restore dedup state
        uses: actions/cache/restore@v4
        with:
          path: seen.json
          key: upwork-seen-${{ github.run_id }}
          restore-keys: |
            upwork-seen-

      - name: Run notifier
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          WEBSHARE_URL: ${{ secrets.WEBSHARE_URL }}   # optional; leave unset to go direct
          MAX_PAGES: ${{ vars.MAX_PAGES }}
          MAX_NOTIFS: ${{ vars.MAX_NOTIFS }}
          JOBS_PER_QUERY: ${{ vars.JOBS_PER_QUERY }}
          # KEYWORDS/EXCLUDE_KEYWORDS are only a fallback if filters.json is missing.
          KEYWORDS: ${{ vars.KEYWORDS }}
          EXCLUDE_KEYWORDS: ${{ vars.EXCLUDE_KEYWORDS }}
        run: python notifier.py

      # Save the updated seen.json under a unique key (old caches auto-expire in 7 days).
      - name: Save dedup state
        uses: actions/cache/save@v4
        with:
          path: seen.json
          key: upwork-seen-${{ github.run_id }}
