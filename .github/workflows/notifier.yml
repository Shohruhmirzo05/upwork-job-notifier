name: Upwork Job Notifier

on:
  schedule:
    # RESTART HEARTBEAT ONLY. The job below loops internally for ~5.3 hours, so we do
    # NOT depend on the (unreliable) scheduler firing every few minutes — it only has to
    # fire ~once every 5h to relaunch after a run ends. */15 is frequent enough for that
    # while being far less likely to be throttled/dropped than an aggressive */5.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}

# One run at a time. When the long run ends, the next queued/heartbeat run starts.
concurrency:
  group: upwork-notifier
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 350   # ~5.8h, under the 6h hard cap; loop exits ~5.3h
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      WEBSHARE_URL: ${{ secrets.WEBSHARE_URL }}
      HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}   # dead-man's-switch (optional)
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}     # free Gemini key for proposals (optional)
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}     # paid fallback when Gemini is exhausted
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
      MAX_PAGES: ${{ vars.MAX_PAGES }}
      MAX_NOTIFS: ${{ vars.MAX_NOTIFS }}
      MAX_AGE_HOURS: ${{ vars.MAX_AGE_HOURS }}
      JOBS_PER_QUERY: ${{ vars.JOBS_PER_QUERY }}
      KEYWORDS: ${{ vars.KEYWORDS }}
      EXCLUDE_KEYWORDS: ${{ vars.EXCLUDE_KEYWORDS }}
      CHECK_INTERVAL: ${{ vars.CHECK_INTERVAL }}
      CYCLE_SECONDS: "2400"   # each cycle loops 40 min, then state is cached
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt

      # Restore the latest dedup state saved by any previous cycle/run.
      - name: Restore dedup state
        uses: actions/cache/restore@v4
        with:
          path: |
            seen.json
            store.json
          key: upwork-seen-${{ github.run_id }}-restore
          restore-keys: |
            upwork-seen-

      # 8 cycles x 40 min = ~5.3h of continuous ~90s checking. State is cached after each
      # cycle so an unexpected death costs at most one cycle (~40 min) of dedup.
      - name: Cycle 1
        continue-on-error: true
        run: bash ./run_cycle.sh
      - name: Save state 1
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            seen.json
            store.json
          key: upwork-seen-${{ github.run_id }}-1

      - name: Cycle 2
        continue-on-error: true
        run: bash ./run_cycle.sh
      - name: Save state 2
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            seen.json
            store.json
          key: upwork-seen-${{ github.run_id }}-2

      - name: Cycle 3
        continue-on-error: true
        run: bash ./run_cycle.sh
      - name: Save state 3
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            seen.json
            store.json
          key: upwork-seen-${{ github.run_id }}-3

      - name: Cycle 4
        continue-on-error: true
        run: bash ./run_cycle.sh
      - name: Save state 4
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            seen.json
            store.json
          key: upwork-seen-${{ github.run_id }}-4

      - name: Cycle 5
        continue-on-error: true
        run: bash ./run_cycle.sh
      - name: Save state 5
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            seen.json
            store.json
          key: upwork-seen-${{ github.run_id }}-5

      - name: Cycle 6
        continue-on-error: true
        run: bash ./run_cycle.sh
      - name: Save state 6
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            seen.json
            store.json
          key: upwork-seen-${{ github.run_id }}-6

      - name: Cycle 7
        continue-on-error: true
        run: bash ./run_cycle.sh
      - name: Save state 7
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            seen.json
            store.json
          key: upwork-seen-${{ github.run_id }}-7

      - name: Cycle 8
        continue-on-error: true
        run: bash ./run_cycle.sh
      - name: Save state 8
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            seen.json
            store.json
          key: upwork-seen-${{ github.run_id }}-8
