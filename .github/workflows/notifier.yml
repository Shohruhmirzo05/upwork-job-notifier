name: Upwork Job Notifier

on:
  schedule:
    # Restart heartbeat only. The worker below stays alive for five hours and checks
    # Upwork internally every ~90 seconds. Offset the heartbeat from the top of the
    # hour because GitHub documents heavier schedule delays there.
    - cron: "7,22,37,52 * * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "notifier.py"
      - "run_cycle.sh"
      - "requirements.txt"
      - "profile.md"
      - "proposal_prompt.md"
      - ".github/workflows/notifier.yml"

# One worker runs at a time. A scheduled heartbeat waits behind the live worker and
# starts as soon as it ends. A push/manual restart replaces it immediately so rotated
# secrets load without waiting five hours.
concurrency:
  group: upwork-notifier
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 345   # 5h45m, below GitHub's 6h hard limit
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      WEBSHARE_URL: ${{ secrets.WEBSHARE_URL }}
      HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}   # dead-man's-switch (optional)
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}     # free Gemini key for proposals (optional)
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}     # paid fallback when Gemini is exhausted
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
      TRACKER_API_URL: ${{ vars.TRACKER_API_URL }}
      TRACKER_API_TOKEN: ${{ secrets.TRACKER_API_TOKEN }}
      MAX_PAGES: ${{ vars.MAX_PAGES }}
      MAX_NOTIFS: ${{ vars.MAX_NOTIFS }}
      MAX_AGE_HOURS: ${{ vars.MAX_AGE_HOURS }}
      JOBS_PER_QUERY: ${{ vars.JOBS_PER_QUERY }}
      KEYWORDS: ${{ vars.KEYWORDS }}
      EXCLUDE_KEYWORDS: ${{ vars.EXCLUDE_KEYWORDS }}
      CHECK_INTERVAL: ${{ vars.CHECK_INTERVAL }}
      CYCLE_SECONDS: "2250"   # 8 cycles x 37.5 min = exactly 5h continuous runtime
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run regression tests
        run: python -m unittest -q
      - name: Verify OpenAI fallback credentials
        continue-on-error: true
        run: python notifier.py --check-openai

      # Restore the latest dedup state saved by any previous cycle/run.
      - name: Restore dedup state
        uses: actions/cache/restore@v4
        with:
          path: |
            seen.json
            store.json
          key: upwork-seen-${{ github.run_id }}-restore
          restore-keys: |
            upwork-seen-

      # Eight cycles keep the bot live for exactly five hours. Saving state after each
      # cycle limits duplicate notifications if a runner is interrupted unexpectedly.
      - name: Cycle 1
        continue-on-error: true
        run: bash ./run_cycle.sh
      - name: Save state 1
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            seen.json
            store.json
          key: upwork-seen-${{ github.run_id }}-1

      - name: Cycle 2
        continue-on-error: true
        run: bash ./run_cycle.sh
      - name: Save state 2
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            seen.json
            store.json
          key: upwork-seen-${{ github.run_id }}-2

      - name: Cycle 3
        continue-on-error: true
        run: bash ./run_cycle.sh
      - name: Save state 3
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            seen.json
            store.json
          key: upwork-seen-${{ github.run_id }}-3

      - name: Cycle 4
        continue-on-error: true
        run: bash ./run_cycle.sh
      - name: Save state 4
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            seen.json
            store.json
          key: upwork-seen-${{ github.run_id }}-4

      - name: Cycle 5
        continue-on-error: true
        run: bash ./run_cycle.sh
      - name: Save state 5
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            seen.json
            store.json
          key: upwork-seen-${{ github.run_id }}-5

      - name: Cycle 6
        continue-on-error: true
        run: bash ./run_cycle.sh
      - name: Save state 6
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            seen.json
            store.json
          key: upwork-seen-${{ github.run_id }}-6

      - name: Cycle 7
        continue-on-error: true
        run: bash ./run_cycle.sh
      - name: Save state 7
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            seen.json
            store.json
          key: upwork-seen-${{ github.run_id }}-7

      - name: Cycle 8
        continue-on-error: true
        run: bash ./run_cycle.sh
      - name: Save state 8
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            seen.json
            store.json
          key: upwork-seen-${{ github.run_id }}-8
