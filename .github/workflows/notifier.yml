name: Upwork Job Notifier

on:
  schedule:
    # Heartbeat for the short worker job. A fresh runner reloads current secrets each cycle.
    - cron: "*/15 * * * *"
  workflow_dispatch: {}
  push:
    branches: [main]
    paths:
      - "notifier.py"
      - "run_cycle.sh"
      - "requirements.txt"
      - "profile.md"
      - "proposal_prompt.md"
      - ".github/workflows/notifier.yml"

# A push/manual restart replaces the stale process immediately so rotated secrets load.
# Scheduled heartbeats queue normally and keep the service continuous.
concurrency:
  group: upwork-notifier
  cancel-in-progress: ${{ github.event_name != 'schedule' }}

permissions:
  contents: read

jobs:
  notify:
    runs-on: ubuntu-latest
    timeout-minutes: 35
    env:
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      WEBSHARE_URL: ${{ secrets.WEBSHARE_URL }}
      HEALTHCHECK_URL: ${{ secrets.HEALTHCHECK_URL }}   # dead-man's-switch (optional)
      GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}     # free Gemini key for proposals (optional)
      GEMINI_MODEL: ${{ vars.GEMINI_MODEL }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}     # paid fallback when Gemini is exhausted
      OPENAI_MODEL: ${{ vars.OPENAI_MODEL }}
      TRACKER_API_URL: ${{ vars.TRACKER_API_URL }}
      TRACKER_API_TOKEN: ${{ secrets.TRACKER_API_TOKEN }}
      MAX_PAGES: ${{ vars.MAX_PAGES }}
      MAX_NOTIFS: ${{ vars.MAX_NOTIFS }}
      MAX_AGE_HOURS: ${{ vars.MAX_AGE_HOURS }}
      JOBS_PER_QUERY: ${{ vars.JOBS_PER_QUERY }}
      KEYWORDS: ${{ vars.KEYWORDS }}
      EXCLUDE_KEYWORDS: ${{ vars.EXCLUDE_KEYWORDS }}
      CHECK_INTERVAL: ${{ vars.CHECK_INTERVAL }}
      CYCLE_SECONDS: "1200"   # short jobs reload rotated secrets within ~20 min
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run regression tests
        run: python -m unittest -q
      - name: Verify OpenAI fallback credentials
        if: github.event_name == 'push' || github.event_name == 'workflow_dispatch'
        continue-on-error: true
        run: python notifier.py --check-openai

      # Restore the latest dedup state saved by any previous cycle/run.
      - name: Restore dedup state
        uses: actions/cache/restore@v4
        with:
          path: |
            seen.json
            store.json
          key: upwork-seen-${{ github.run_id }}-restore
          restore-keys: |
            upwork-seen-

      # One short cycle per job ensures each new runner receives current GitHub secrets.
      - name: Run notifier cycle
        continue-on-error: true
        run: bash ./run_cycle.sh
      - name: Save dedup state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            seen.json
            store.json
          key: upwork-seen-${{ github.run_id }}
